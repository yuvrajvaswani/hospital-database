spring.application.name=Hospital Management System

# Server Configuration
server.port=8080
server.servlet.context-path=/

# H2 Database Configuration (file-based - data persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/hospitaldb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.hospital=DEBUG
logging.level.org.springframework.web=DEBUG

# Jackson - serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
